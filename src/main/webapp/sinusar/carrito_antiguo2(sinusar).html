<!DOCTYPE html>
<html lang="es">
<script src="js/carrito.js"></script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carrito - EVERNEST</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div id="cabecera"></div>
    </header>

    <div class="container content">
        <h2>Carrito de compras</h2>

        <div id="productosCarrito">
            <!-- Los productos del carrito se mostrarán aquí -->
        </div>

        <div id="total" class="mt-4">
            <p><strong>Total: </strong><span id="totalAmount">0€</span></p>
        </div>

        <div class="mt-4">
            <button id="finalizarCompra" class="btn btn-success">Finalizar Compra</button>
        </div>
    </div>

    <footer class="footer">
        <div id="pie"></div>
    </footer>

    <script src="js/plantilla.js"></script>
    <script src="js/carrito.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", mostrarCarrito);
    </script>
    
</body>
</html>
