<!DOCTYPE html>
<html lang="es">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Productos - EVERNEST</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div id="cabecera"></div>
    </header>

    <div class="container content">
        <h2>Productos disponibles en EVERNEST</h2>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-5">
            <!-- Producto 1 -->
            <div class="col mb-4">
                <div class="card">
                    <img src="pics/imagen_producto1.jpg" class="card-img-top" alt="Producto 1">
                    <div class="card-body">
                        <h5 class="card-title">Big Agnes - Copper Spur HV UL2</h5>
                        <p class="card-text">Tienda de campaña 2 personas</p>
                        <p><strong>Precio: 465€</strong></p>
                        <button class="btn btn-primary" onclick="anadirCarrito(1, 'Big Agnes - Copper Spur HV UL2', 'pics/imagen_producto1.jpg', 465, 5)">Añadir al carrito</button>

                    </div>
                </div>
            </div>
            <!-- Producto 2 -->
            <div class="col mb-4">
                <div class="card">
                    <img src="pics/imagen_producto2.jpg" class="card-img-top" alt="Producto 2">
                    <div class="card-body">
                        <h5 class="card-title">Stoic - NjavveSt. III 2P UL</h5>
                        <p class="card-text">Tienda de campaña 2 personas</p>
                        <p><strong>Precio: 244€</strong></p>
                        <button class="btn btn-primary" onclick="anadirCarrito(2, 'Stoic - NjavveSt. III 2P UL', 'pics/imagen_producto2.jpg', 244, 4)">Añadir al carrito</button>

                    </div>
                </div>
            </div>
            <!-- Producto 3 -->
            <div class="col mb-4">
                <div class="card">
                    <img src="pics/imagen_producto3.jpg" class="card-img-top" alt="Producto 3">
                    <div class="card-body">
                        <h5 class="card-title">Nemo - Tani OSMO 2P</h5>
                        <p class="card-text">Tienda de campaña de 2 personas</p>
                        <p><strong>Precio: 330€</strong></p>
                        <button class="btn btn-primary" onclick="anadirCarrito(3, 'Nemo - Tani OSMO 2P', 'pics/imagen_producto3.jpg', 330, 2)">Añadir al carrito</button>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div id="pie"></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/plantilla.js"></script>
    <script src="js/carrito.js"></script>
</body>
</html>
