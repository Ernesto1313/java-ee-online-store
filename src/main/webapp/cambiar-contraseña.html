<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cambiar Contraseña - EVERNEST</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div id="cabecera"></div>
    </header>

    <div class="container content">
        <h2>Cambiar Contraseña</h2>
        <p>Introduce tu contraseña actual y la nueva para actualizarla.</p>
        
        <form id="changePasswordForm">
            <div class="mb-3">
                <label for="oldPassword" class="form-label">Contraseña actual</label>
                <input type="password" class="form-control" id="oldPassword" required>
            </div>
            <div class="mb-3">
                <label for="newPassword" class="form-label">Nueva contraseña</label>
                <input type="password" class="form-control" id="newPassword" required>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirmar nueva contraseña</label>
                <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn btn-primary">Actualizar Contraseña</button>
            <a href="usuario.html" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>

    <footer class="footer">
        <div id="pie"></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/plantilla.js"></script>
</body>
</html>
